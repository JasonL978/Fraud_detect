# P2P Fraud Detection — local dev stack
# Week 1 Day 1: Redpanda (broker + built-in Schema Registry) + Console + topic bootstrap.
#
# Redpanda is a single binary that exposes the Kafka API (9092), a built-in
# Schema Registry (8081), the HTTP proxy / pandaproxy (8082), and an admin API
# (9644). We do NOT need a separate Confluent Schema Registry container.
#
# Bring up:   docker compose up -d
# Verify:     docker compose exec redpanda rpk topic list
#             curl -s http://localhost:18081/subjects   # schema registry reachable
# Console UI: http://localhost:8080
# Tear down:  docker compose down            (add -v to wipe data)

name: fraud-detect

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: fd-redpanda
    command:
      - redpanda
      - start
      - --smp=1                       # 1 core — laptop-friendly
      - --memory=1G                   # cap RAM per the design doc (~1GB)
      - --reserve-memory=0M
      - --overprovisioned             # tolerate a shared/over-committed host
      - --node-id=0
      - --check=false
      # Advertise both an internal (container network) and external (host) listener
      # so the producer on the host AND containers can both connect cleanly.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092"   # Kafka API (host clients)
      - "18081:18081"   # Schema Registry (host)
      - "18082:18082"   # HTTP proxy (host)
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      # Cluster is healthy once the broker reports ready.
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # One-shot bootstrap: waits for the broker, then creates topics idempotently.
  # Exits 0 when done; re-running `up` is safe (topic create is idempotent).
  topic-init:
    image: redpandadata/redpanda:v24.2.7
    container_name: fd-topic-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        BROKER="redpanda:9092"
        echo "Creating topics on ${BROKER} ..."
        # transactions.v1 is the only Day-1 topic. The other four topics
        # (auth_events, user_disputes, chargebacks, confirmed_fraud) arrive
        # when label quarantine is built — see design doc Week 5.
        rpk topic create transactions.v1 \
          --brokers "${BROKER}" \
          --partitions 3 \
          --replicas 1 \
          --topic-config retention.ms=604800000 || true
        echo "--- topics ---"
        rpk topic list --brokers "${BROKER}"
    restart: "no"

  console:
    image: redpandadata/console:v2.7.2
    container_name: fd-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: "http://redpanda:8081"
    restart: unless-stopped

volumes:
  redpanda-data:
    driver: local
